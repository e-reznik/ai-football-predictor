# Logging
logging.level.de.ereznik.aifootballpredictor.client.NewsClientImpl=DEBUG
# Global
spring.application.name=AI Football Predictor
spring.ai.chat.client.enabled=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Football Data
football-data.base-url=https://api.football-data.org/v4
football-data.competitions=BL1,PL,PD,SA
# Brave
brave.base_url=https://api.search.brave.com
brave.suffix=prediction statistics form
# Prompts
ai.prompt.part.1=You are a football match predictor. Predict the exact scores for the following matches.
ai.prompt.part.2=Base your predictions on the recent analysis and statistics provided per match below:
ai.prompt.part.3=Return only valid JSON with no markdown, no code fences, no explanation. Confidence should be an integer from 1-10 where 10 is highest confidence: