name: Deploy to vServer

on:
  workflow_run:
    workflows: [ "Java CI with Maven" ]
    types:
      - completed
    branches: [ "master", "test" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to vServer
        uses: appleboy/ssh-action@v1.2.5
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SPRING_AI_OPENAI_API_KEY: ${{ secrets.SPRING_AI_OPENAI_API_KEY }}
          SPRING_AI_ANTHROPIC_API_KEY: ${{ secrets.SPRING_AI_ANTHROPIC_API_KEY }}
          SPRING_AI_MISTRAL_API_KEY: ${{ secrets.SPRING_AI_MISTRAL_API_KEY }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: FOOTBALL_DATA_TOKEN,SPRING_AI_OPENAI_API_KEY,SPRING_AI_ANTHROPIC_API_KEY,SPRING_AI_MISTRAL_API_KEY,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,GRAFANA_ADMIN_PASSWORD
          script: |
            cd /opt/ai-football-predictor
            git config --global --add safe.directory /opt/ai-football-predictor
            git pull
            cat > .env <<EOF
            FOOTBALL_DATA_TOKEN=$FOOTBALL_DATA_TOKEN
            SPRING_AI_OPENAI_API_KEY=$SPRING_AI_OPENAI_API_KEY
            SPRING_AI_ANTHROPIC_API_KEY=$SPRING_AI_ANTHROPIC_API_KEY
            SPRING_AI_MISTRAL_API_KEY=$SPRING_AI_MISTRAL_API_KEY
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            GRAFANA_ADMIN_PASSWORD=$GRAFANA_ADMIN_PASSWORD
            EOF
            docker compose build --no-cache app
            docker compose up -d --force-recreate