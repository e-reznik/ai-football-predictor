services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: football_predictor
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U football -d football_predictor" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prd
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/football_predictor
      SPRING_DATASOURCE_USERNAME: football
      SPRING_DATASOURCE_PASSWORD: football
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN}
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY}
      SPRING_AI_ANTHROPIC_API_KEY: ${SPRING_AI_ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: